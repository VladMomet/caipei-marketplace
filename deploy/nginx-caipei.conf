# =======================================================================
# CaiPei — Nginx конфигурация для 3 сайтов на одной VM.
#
# Установка на VM (Ubuntu):
#   sudo cp deploy/nginx-caipei.conf /etc/nginx/sites-available/caipei
#   sudo ln -s /etc/nginx/sites-available/caipei /etc/nginx/sites-enabled/
#   sudo rm /etc/nginx/sites-enabled/default
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# SSL получаем через certbot ПОСЛЕ настройки DNS:
#   sudo certbot --nginx -d caipei.ru -d www.caipei.ru
#   sudo certbot --nginx -d caipei-lite.ru -d www.caipei-lite.ru
#   sudo certbot --nginx -d caipei-premium.ru -d www.caipei-premium.ru
#
# После получения сертификатов certbot автоматически допишет
# ssl-директивы в этот же файл.
# =======================================================================

# --- HTTP → HTTPS редиректы --------------------------------------------
# certbot сам добавит эти блоки при получении сертификатов,
# но если хочешь вручную — вот шаблон:

server {
    listen 80;
    listen [::]:80;
    server_name caipei-lite.ru www.caipei-lite.ru;
    return 301 https://caipei-lite.ru$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name caipei.ru www.caipei.ru;
    return 301 https://caipei.ru$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name caipei-premium.ru www.caipei-premium.ru;
    return 301 https://caipei-premium.ru$request_uri;
}

# --- CaiPei Lite → PM2 process на порту 3000 ---------------------------

server {
    server_name caipei-lite.ru www.caipei-lite.ru;

    # Настройки прокси для Next.js
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # После certbot тут появятся:
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/caipei-lite.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/caipei-lite.ru/privkey.pem;
    listen 80;
}

# --- CaiPei (Standard) → PM2 process на порту 3001 ---------------------

server {
    server_name caipei.ru www.caipei.ru;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    listen 80;
}

# --- CaiPei Prestige → PM2 process на порту 3002 -----------------------

server {
    server_name caipei-premium.ru www.caipei-premium.ru;

    location / {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
